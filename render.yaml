# render.yaml - Configuración de deploy en Render
# Subí este archivo a la raíz del repo y Render lo detecta automáticamente

services:
  - type: web
    name: digital-sentience-server
    runtime: python
    plan: free
    region: oregon

    # ✅ Forzar Python 3.11 — pydantic-core no compila en Python 3.14
    pythonVersion: "3.11.9"

    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1

    envVars:
      - key: MODEL_DIR
        value: /data/models
      - key: CHROMA_DIR
        value: /data/chroma
      - key: PORT
        value: "8000"

    # Disco persistente: IMPORTANTE para que el modelo no se descargue en cada deploy
    # Cuesta $1/mes en Render (500MB de disco). Sin esto, cada restart descarga el modelo.
    disk:
      name: sentience-data
      mountPath: /data
      sizeGB: 1
